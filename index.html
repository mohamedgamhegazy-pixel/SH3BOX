<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH3BOX Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#0f172a;color:white;height:100vh}
header{height:70px;background:#111827;display:flex;align-items:center;justify-content:space-between;padding:0 25px;border-bottom:1px solid #334155}
.logo{font-size:28px;font-weight:bold;color:#38bdf8}
button{background:#38bdf8;border:none;padding:12px 25px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
.editors{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:10px;height:45vh}
.editor{background:#111827;border-radius:15px;overflow:hidden;border:1px solid #334155}
.editor h3{background:#1e293b;padding:12px;text-align:center}
textarea{width:100%;height:100%;background:#111827;color:#fff;border:none;resize:none;padding:15px;outline:none}
.output{padding:10px;height:45vh}
iframe{width:100%;height:100%;border:none;border-radius:15px;background:white}
</style>
</head>
<body>
<header>
<div class="logo">SH3BOX EDITOR</div>
<button onclick="runCode()">▶ تشغيل الكود</button>
</header>

<div class="editors">
<div class="editor"><h3>HTML</h3><textarea id="html"><h1>Hello SH3BOX</h1></textarea></div>
<div class="editor"><h3>CSS</h3><textarea id="css">h1{color:dodgerblue;text-align:center;}</textarea></div>
<div class="editor"><h3>JavaScript</h3><textarea id="js">console.log('Welcome');</textarea></div>
</div>

<div class="output"><iframe id="output"></iframe></div>

<script>
function runCode(){
const html=document.getElementById('html').value;
const css=document.getElementById('css').value;
const js=document.getElementById('js').value;
document.getElementById('output').srcdoc=`
<!DOCTYPE html><html><head><style>${css}</style></head><body>
${html}
<script>${js}<\/script>
</body></html>`;
}
runCode();
</script>
</body>
</html>
